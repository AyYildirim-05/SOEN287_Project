<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Teacher Settings</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="settings.css">

</head>

<body>
  <!-- HEADER -->
  <header>

    <div class="logo">
      <img src="../Images/concordia_logo.png">
    </div>

    <nav>
      <a href="../index.html" class="backLink">← Dashboard</a>
    </nav>

    <div class="account">

      <a href="../Auths/sign_in.html" class="login">Log In</a>
      <a href="../Auths/sign_up.html" class="signup">Sign Up</a>

      <div class="profile">
        <img src="../Images/profile_icon.png" onclick="toggleProfileMenu()">
      </div>

    </div>

  </header>

    <!-- Fields user -->
    <div class="container">
      <h2>Student Settings</h2>
      <form id="form-group">

        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname">

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" >

        <label for="major">Major:</label>
        <input type="text" id="major" name="major" >

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" >

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" >

        <button class="submit-btn" type="submit">Save Changes</button>
      </form>
    </div>


  <script src="../mainPage.js"></script>
  <script src="../userStatus.js"></script>
</body>

</html>
