<div id="unenrollCourseModal" class="modalOverlay hidden">
  <div class="modal">
    <div class="modalHeader">
      <h3>Unenroll from Course</h3>
      <button id="closeUnenrollModalBtn" class="iconBtn" type="button">✕</button>
    </div>
    <div class="modalBody">
      <p id="unenrollText"></p>
      <label>
        Type the course code to confirm:
        <input id="unenrollConfirmInput" type="text" placeholder="e.g., SOEN 287" />
      </label>
      <div class="modalFooter">
        <button type="button" id="cancelUnenrollBtn" class="btnSecondary">Cancel</button>
        <button type="button" id="confirmUnenrollBtn" class="btnPrimary" disabled>Unenroll</button>
      </div>
    </div>
  </div>
</div>
