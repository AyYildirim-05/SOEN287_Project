<div id="addAnnouncementOverlay" class="modalOverlay hidden">

  <div class="modal">

    <div class="modalHeader">
      <h2>Add Announcement</h2>
      <button id="closeAnnouncementModalBtn" class="iconBtn">✕</button>
    </div>

    <div class="modalBody">

      <label>
        Announcement
        <input id="announcementTextInput" type="text"
               placeholder="Enter announcement">
      </label>

      <div class="modalFooter">
        <button id="cancelAnnouncementBtn" class="btnSecondary">Cancel</button>
        <button id="saveAnnouncementBtn" class="btnPrimary">Add</button>
      </div>

    </div>

  </div>

</div>
