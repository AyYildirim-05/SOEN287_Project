<div id="addAnnouncementOverlay" class="modalOverlay hidden">
  <div class="modal">
    <div class="modalHeader">
      <h2 id="announcementModalTitle">Add Announcement</h2>
      <button id="closeAnnouncementModalBtn" class="iconBtn" type="button">✕</button>
    </div>

    <div class="modalBody">
      <label>
        Title
        <input id="announcementTitleInput" type="text" placeholder="Enter title">
      </label>

      <label>
        Description
        <textarea id="announcementDescriptionInput" placeholder="Enter announcement details"></textarea>
      </label>

      <div class="modalFooter">
        <button id="cancelAnnouncementBtn" class="btnSecondary" type="button">Cancel</button>
        <button id="saveAnnouncementBtn" class="btnPrimary" type="button">Save</button>
      </div>
    </div>
  </div>
</div>
