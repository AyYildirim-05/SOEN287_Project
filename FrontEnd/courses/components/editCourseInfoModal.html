<div id="editCourseInfoOverlay" class="modalOverlay hidden">
    <div class="modal">
        <div class="modalHeader">
            <h2 style="margin:0;">Edit Course Info</h2>
            <button id="closeEditCourseInfoBtn" class="iconBtn" type="button">✕</button>
        </div>

        <div class="modalBody">
            <label>
                Course title
                <input id="editCourseTitle" type="text" placeholder="SOEN 287 - Web Programming">
            </label>

            <label>
                Instructor
                <input id="editCourseInstructor" type="text" placeholder="Abdel">
            </label>

            <label>
                Credits
                <input id="editCourseCredits" type="text" placeholder="3 Credits">
            </label>

            <label for="editCourseSection">Section</label>
            <input type="text" id="editCourseSection">

            <label for="editCourseSchedule">Schedule</label>
            <input type="text" id="editCourseSchedule">

            <label>
                TAs
                <input id="editCourseTAs" type="text" placeholder="Alice, Bob, Charlie">
            </label>

            <div class="modalFooter">
                <button id="cancelEditCourseInfoBtn" class="btnSecondary" type="button">Cancel</button>
                <button id="saveCourseInfoBtn" class="btnPrimary" type="button">Save</button>
            </div>
        </div>
    </div>
</div>
