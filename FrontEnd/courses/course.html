<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Course Page</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="courses.css">
  <link rel="stylesheet" href="coursepage.css">
</head>

<body>
  <!-- HEADER -->
  <header>

    <div class="logo">
      <img src="../Images/concordia_logo.png">
    </div>

    <nav>
      <a href="../index.html" class="backLink">← Dashboard</a>
    </nav>

    <div class="account">

      <a href="../Auths/sign_in.html" class="login">Log In</a>
      <a href="../Auths/sign_up.html" class="signup">Sign Up</a>

      <div class="profile">
        <img src="../Images/profile_icon.png" onclick="toggleProfileMenu()">
      </div>

    </div>

  </header>

  <div class="homePage">

    <!-- Top Row-->
    <div class="courseTopRow">
      <div class="courseInfoCard">
        <h1 id="courseTitle"></h1>
        <p id="courseInstructor"></p>
        <p id="courseCredits"></p>
        <p id="courseSection"></p>
        <p id="courseSchedule"></p>
        <p id="courseTAs"></p>
        <button id="editCourseInfoBtn" class="btnPrimary teacher-only" type="button">
          Edit course info
        </button>
      </div>
    </div>

    <!-- THREE COLUMNS BELOW -->
    <div class="homePageLayout">
      <div class="classesDisplay">
        <h3>Assignments</h3>

        <button id="addAssignmentBtn" class="addButton teacher-only">
          + Add Assignment
        </button>

        <!-- Matches index.html assignment layout -->
        <div class="assignmentsSection" id="assignmentsSection"></div>
      </div>

      <!-- GREEN ANNOUNCEMENTS COLUMN -->
      <div class="schedule"> <!-- Reusing schedule -->
        <h3>Announcements</h3>

        <button id="addAnnouncementBtn" class="addButton teacher-only">
          + Add Announcement
        </button>

        <div class="scheduleDisplay greenAnnouncements">
          <ul id="announcementList"></ul>
        </div>
      </div>

      <!-- GRADES COLUMN -->
      <div class="gradesGraph">
        <h3>Grades</h3>
        <div class="graphContainer">
          <canvas id="gradesCanvas" width="400" height="250"></canvas>
          <ul id="gradeList"></ul>
        </div>
      </div>
    </div>

  </div>

  <!-- Grade Input Modal (student-only) -->
  <div id="gradeModalOverlay" class="modalOverlay hidden">
    <div class="modal">
      <div class="modalHeader">
        <h2 style="margin:0;">Enter Your Grade</h2>
        <button id="closeGradeModalBtn" class="iconBtn" type="button">✕</button>
      </div>
      <div class="modalBody">
        <p id="gradeModalAssignmentTitle" style="margin:0 0 8px; font-weight:600;"></p>
        <label>
          Your Score (0 – 100)
          <input id="gradeScoreInput" type="number" min="0" max="100" placeholder="e.g. 88">
        </label>
        <div class="modalFooter">
          <button id="cancelGradeBtn" class="btnSecondary" type="button">Cancel</button>
          <button id="saveGradeBtn" class="btnPrimary" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

   <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
  <script src="coursepage.js"></script>
  <script src="roleToggle.js"></script>
  <script src="../mainPage.js"></script>
  <script src="../userStatus.js"></script>
</body>

</html>
